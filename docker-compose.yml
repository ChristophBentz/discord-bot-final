# One-command Setup für Discord-Bot-Final.
#
# Voraussetzung: .env-File auf Basis von .env.example anlegen.
#
# Start:    docker compose up -d
# Logs:     docker compose logs -f
# Stop:     docker compose down
# Update:   git pull && docker compose build && docker compose up -d
#
# Reverse-Proxy: Web läuft auf Port 3000. Wenn du HTTPS willst, stell
# einen Caddy/Nginx/Cloudflare-Tunnel davor.

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discord-bot
    restart: unless-stopped
    env_file: .env
    environment:
      # DB landet im persistenten Volume, nicht im Container
      DATABASE_URL: file:/data/dev.db
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000" # Web-Dashboard — nur lokal binden, Proxy davor
      - "127.0.0.1:4001:4001" # Bot-API — niemals public
    volumes:
      - botdata:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  botdata:
